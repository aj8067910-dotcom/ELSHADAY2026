version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: elshaday
      POSTGRES_PASSWORD: elshaday
      POSTGRES_DB: elshaday
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U elshaday']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://elshaday:elshaday@postgres:5432/elshaday?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: troque-em-producao
      JWT_REFRESH_SECRET: troque-tambem-em-producao
      CORS_ORIGIN: http://localhost:3000
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_URL: http://api:3001
    ports:
      - '3000:3000'
    depends_on:
      - api

volumes:
  pgdata:
