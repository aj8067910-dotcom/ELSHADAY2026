# Blueprint de deploy no Render (https://render.com)
# Dashboard → New → Blueprint → selecione este repositório.
# Cria: PostgreSQL + API (NestJS) + Web (Next.js).

databases:
  - name: elshaday-db
    plan: free
    databaseName: elshaday
    user: elshaday

services:
  # ---------- API (NestJS + Prisma) ----------
  - type: web
    name: elshaday-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    # migra o banco e roda as seeds (idempotentes) antes de subir
    startCommand: npx prisma migrate deploy && npx ts-node prisma/seed.ts && node dist/main.js
    healthCheckPath: /docs
    envVars:
      - key: NODE_VERSION
        value: '20'
      - key: DATABASE_URL
        fromDatabase:
          name: elshaday-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d

  # ---------- Web (Next.js) ----------
  - type: web
    name: elshaday-web
    runtime: node
    plan: free
    rootDir: apps/web
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: '20'
      # URL pública da API. Se o Render criar o serviço com outro nome
      # (ex.: elshaday-api-xxxx), ajuste este valor no dashboard.
      - key: API_URL
        value: https://elshaday-api.onrender.com
